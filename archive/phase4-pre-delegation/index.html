<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#070b14">
<title>⚗️ كيمياء — خرائط ذهنية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/app.css">
</head>
<body data-theme="dark">
<div id="app">
  <!-- TOPBAR -->
  <div id="topbar">
    <button class="topbar-btn" id="btn-back" onclick="App.back()" style="display:none" aria-label="رجوع">←</button>
    <div id="topbar-logo">⚗️ Chemistry MindMap Pro</div>
    <button class="topbar-btn" id="btn-theme" onclick="App.toggleTheme()" aria-label="تغيير الوضع">🌙</button>
  </div>

  <!-- MAIN VIEW -->
  <div id="view" class="scroll-y"></div>

  <!-- BOTTOM NAV -->
  <nav id="bottomnav">
    <button class="nav-item active" id="nav-home"    onclick="App.tab('home')"   ><span class="nav-icon">🏠</span><span>الرئيسية</span></button>
    <button class="nav-item"        id="nav-organic"  onclick="App.tab('organic')" ><span class="nav-icon">🧪</span><span>عضوي</span></button>
    <button class="nav-item"        id="nav-search"  onclick="App.tab('search')" ><span class="nav-icon">🔍</span><span>بحث</span></button>
    <button class="nav-item"        id="nav-quiz"    onclick="App.tab('quiz')"   ><span class="nav-icon">🧠</span><span>اختبار</span></button>
    <button class="nav-item"        id="nav-flash"   onclick="App.tab('flash')"  ><span class="nav-icon">🃏</span><span>بطاقات</span></button>
  </nav>
</div>
<div id="toast"></div>

<script type="module" src="assets/js/main.js"></script>
</body>
</html>
