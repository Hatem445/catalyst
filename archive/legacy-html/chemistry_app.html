<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🧪 كيمياء الثانوية — خرائط ذهنية</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0e1a;--bg2:#111827;--card:#1a2035;--border:#2a3550;
  --text:#e2e8f0;--muted:#64748b;--accent:#6366f1;--accent2:#8b5cf6;
  --green:#10b981;--red:#ef4444;--yellow:#f59e0b;--cyan:#06b6d4;
  --orange:#f97316;--pink:#ec4899;
  --law:#fbbf24;--eq:#34d399;--obs:#f472b6;--mem:#a78bfa;
  --radius:12px;--shadow:0 4px 24px rgba(0,0,0,.4);
}
[data-theme="light"]{
  --bg:#f0f4ff;--bg2:#e8ecf8;--card:#fff;--border:#d1d9ef;
  --text:#1e293b;--muted:#94a3b8;--shadow:0 4px 24px rgba(0,0,0,.1);
}
html,body{height:100%;overflow:hidden;font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text)}

/* LAYOUT */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#topbar{
  background:rgba(10,14,26,.85);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);padding:10px 14px;
  display:flex;align-items:center;gap:8px;flex-shrink:0;position:relative;z-index:100;
}
[data-theme="light"] #topbar{background:rgba(240,244,255,.9)}
#topbar-title{flex:1;font-size:15px;font-weight:900;text-align:center;
  background:linear-gradient(90deg,#818cf8,#c084fc,#fb7185);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.icon-btn{background:rgba(255,255,255,.08);border:none;border-radius:8px;
  padding:7px 9px;color:var(--text);cursor:pointer;font-size:16px;flex-shrink:0;
  transition:background .2s}
.icon-btn:active{background:rgba(255,255,255,.18)}
[data-theme="light"] .icon-btn{background:rgba(0,0,0,.06)}

#content{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px;padding-bottom:80px}
#content::-webkit-scrollbar{width:4px}
#content::-webkit-scrollbar-track{background:transparent}
#content::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* BOTTOM NAV */
#bottomnav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(10,14,26,.92);backdrop-filter:blur(16px);
  border-top:1px solid var(--border);
  display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom,0);
}
[data-theme="light"] #bottomnav{background:rgba(240,244,255,.95)}
.nav-btn{flex:1;border:none;background:none;color:var(--muted);
  padding:10px 4px 8px;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:3px;font-size:10px;font-family:'Cairo',sans-serif;
  transition:color .2s}
.nav-btn.active{color:var(--accent)}
.nav-btn span:first-child{font-size:20px}

/* SEARCH */
#search-wrap{position:relative;margin-bottom:14px}
#search-input{
  width:100%;background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:11px 44px 11px 14px;
  color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;outline:none;
  transition:border .2s}
#search-input:focus{border-color:var(--accent)}
#search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);opacity:.4;font-size:16px}
#search-results{display:none}
#search-results.show{display:block}
.search-item{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px;margin-bottom:8px;cursor:pointer;transition:border .2s;
}
.search-item:active{border-color:var(--accent)}
.search-item-title{font-weight:700;font-size:14px;margin-bottom:4px}
.search-item-path{color:var(--muted);font-size:11px}
.search-item-preview{color:var(--muted);font-size:12px;margin-top:4px;line-height:1.6}

/* HOME CARDS */
.unit-card{
  background:var(--card);border-radius:16px;padding:22px 18px;
  margin-bottom:14px;cursor:pointer;border:1px solid var(--border);
  transition:transform .15s,box-shadow .15s;display:flex;align-items:center;gap:16px;
  box-shadow:var(--shadow);
}
.unit-card:active{transform:scale(.97)}
.unit-icon{font-size:36px;flex-shrink:0}
.unit-info{flex:1;text-align:right}
.unit-title{font-size:16px;font-weight:900;margin-bottom:4px}
.unit-meta{color:var(--muted);font-size:12px}
.unit-arrow{color:var(--muted);font-size:18px;flex-shrink:0}
.progress-bar{height:4px;background:var(--border);border-radius:99px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;transition:width .5s}

/* SECTIONS */
.section-btn{
  background:var(--card);border-radius:var(--radius);padding:14px 16px;
  margin-bottom:10px;cursor:pointer;border:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  transition:transform .15s;box-shadow:var(--shadow);
}
.section-btn:active{transform:scale(.97)}
.section-title-text{font-size:15px;font-weight:700}
.section-meta{color:var(--muted);font-size:12px;margin-top:3px}

/* NODES */
.node-card{margin-bottom:8px;border-radius:var(--radius);overflow:hidden}
.node-header{
  padding:12px 14px;cursor:pointer;display:flex;
  justify-content:space-between;align-items:center;
  border-radius:var(--radius);border:1px solid transparent;transition:all .2s;
}
.node-header.open{border-radius:var(--radius) var(--radius) 0 0}
.node-title-text{font-size:14px;font-weight:700}
.node-arrow{font-size:12px;opacity:.7;transition:transform .2s}
.node-header.open .node-arrow{transform:rotate(180deg)}
.node-body{
  display:none;padding:12px 14px;border:1px solid transparent;
  border-top:none;border-radius:0 0 var(--radius) var(--radius);
}
.node-body.open{display:block}
.node-item{
  display:flex;align-items:flex-start;gap:8px;margin-bottom:7px;
  padding:6px 10px;border-radius:8px;line-height:1.7;font-size:13px;
}
.node-item-bullet{flex-shrink:0;margin-top:2px;font-size:13px}
.badge{
  display:inline-block;font-size:10px;padding:2px 7px;border-radius:99px;
  font-weight:700;margin-left:6px;vertical-align:middle;
}
.badge-law{background:#fbbf2422;color:#fbbf24;border:1px solid #fbbf2444}
.badge-eq{background:#34d39922;color:#34d399;border:1px solid #34d39944}
.badge-obs{background:#f472b822;color:#f472b8;border:1px solid #f472b844}
.badge-mem{background:#a78bfa22;color:#a78bfa;border:1px solid #a78bfa44}

/* TABLES */
.compare-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:12px}
.compare-table th{background:var(--border);padding:8px;text-align:center;font-weight:700}
.compare-table td{padding:8px;text-align:center;border-bottom:1px solid var(--border)}
.compare-table tr:last-child td{border:none}
.compare-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.compare-section h4{font-size:14px;font-weight:800;margin-bottom:10px;text-align:center}

/* QUIZ */
.quiz-question{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:14px;box-shadow:var(--shadow)}
.quiz-q-text{font-size:15px;font-weight:700;margin-bottom:16px;line-height:1.7}
.quiz-options{display:flex;flex-direction:column;gap:8px}
.quiz-opt{
  background:rgba(255,255,255,.05);border:1px solid var(--border);
  border-radius:10px;padding:11px 14px;cursor:pointer;
  font-family:'Cairo',sans-serif;font-size:13px;color:var(--text);
  text-align:right;transition:all .2s;
}
.quiz-opt:active{transform:scale(.98)}
.quiz-opt.correct{background:#10b98122;border-color:#10b981;color:#10b981}
.quiz-opt.wrong{background:#ef444422;border-color:#ef4444;color:#ef4444}
.quiz-opt.reveal{background:#fbbf2422;border-color:#fbbf24;color:#fbbf24}
.quiz-score{text-align:center;padding:20px;font-size:24px;font-weight:900}
.quiz-score small{display:block;font-size:14px;color:var(--muted);margin-top:6px}
.quiz-progress{height:6px;background:var(--border);border-radius:99px;margin-bottom:16px;overflow:hidden}
.quiz-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .4s}

/* FLASHCARDS */
.flashcard-wrap{perspective:1000px;margin-bottom:20px;cursor:pointer}
.flashcard{
  background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:28px 20px;min-height:180px;display:flex;flex-direction:column;
  justify-content:center;align-items:center;text-align:center;
  box-shadow:var(--shadow);transition:transform .6s;transform-style:preserve-3d;
  position:relative;
}
.flashcard.flipped{transform:rotateY(180deg)}
.flashcard-front,.flashcard-back{
  position:absolute;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  padding:20px;backface-visibility:hidden;border-radius:20px;
}
.flashcard-back{transform:rotateY(180deg);background:var(--card)}
.fc-label{font-size:10px;font-weight:700;letter-spacing:1px;margin-bottom:10px;opacity:.5}
.fc-text{font-size:15px;font-weight:700;line-height:1.7}
.fc-nav{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.fc-nav-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:8px 16px;color:var(--text);cursor:pointer;font-family:'Cairo',sans-serif;font-size:13px}
.fc-counter{color:var(--muted);font-size:13px}

/* EMPTY STATES */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .e-icon{font-size:40px;margin-bottom:12px}

/* MISC */
.btn{
  background:var(--accent);border:none;border-radius:10px;padding:11px 20px;
  color:#fff;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;transition:opacity .2s;width:100%;margin-top:10px;
}
.btn:active{opacity:.8}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text)}
.section-header-bar{
  padding:12px 14px;border-radius:var(--radius);margin-bottom:14px;
}
.section-header-bar h3{font-size:17px;font-weight:900;margin-bottom:2px}
.section-header-bar p{font-size:12px;opacity:.6}
.expected-q{
  background:var(--card);border-right:3px solid var(--yellow);
  border-radius:0 var(--radius) var(--radius) 0;
  padding:12px 14px;margin-bottom:8px;font-size:13px;line-height:1.7;
}
.expected-q .q-num{color:var(--yellow);font-weight:800;margin-left:6px}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 9px;
  border-radius:99px;font-weight:700;margin:2px}
.link-arrow{
  display:flex;align-items:center;gap:8px;padding:10px 12px;
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  margin-bottom:6px;font-size:13px;cursor:pointer;transition:border .2s;
}
.link-arrow:active{border-color:var(--accent)}
.link-arrow .la-from{flex:1;color:var(--text)}
.link-arrow .la-arrow{color:var(--muted)}
.link-arrow .la-to{color:var(--accent)}

/* REACTION CARDS */
.reaction-card{
  background:var(--card);border-radius:var(--radius);padding:14px;
  margin-bottom:8px;border:1px solid var(--border);
}
.reaction-eq{
  font-family:monospace;font-size:13px;background:rgba(0,0,0,.3);
  padding:8px 12px;border-radius:8px;margin:6px 0;line-height:1.8;
  word-break:break-all;
}
[data-theme="light"] .reaction-eq{background:rgba(0,0,0,.05)}
.reaction-obs{font-size:12px;color:var(--pink);margin-top:6px}
.reaction-color{
  display:inline-flex;align-items:center;gap:5px;font-size:12px;
  padding:3px 10px;border-radius:99px;border:1px solid;margin:3px 2px;
}
.color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* TOAST */
#toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#1e293b;border:1px solid var(--border);border-radius:10px;
  padding:10px 18px;font-size:13px;z-index:999;opacity:0;transition:all .3s;
  pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease forwards}
</style>
</head>

<script>
// ============================================================

const COLORS = {
  law:'#fbbf24',eq:'#34d399',obs:'#f472b8',mem:'#a78bfa'
};

function tag(text,type){
  const labels={law:'⚖️ قانون',eq:'⚗️ معادلة',obs:'👁️ ملاحظة',mem:'🔴 حفظ صعب'};
  return `<span class="badge badge-${type}">${labels[type]}</span>`;
}
function colorBadge(label,color){
  return `<span class="reaction-color" style="color:${color};border-color:${color}44"><span class="color-dot" style="background:${color}"></span>${label}</span>`;
}

// TYPE LEGEND for items
// [Q] = قانون  [E] = معادلة  [O] = ملاحظة عملية  [M] = حفظ صعب
function renderItem(item){
  let badge='';let bg='';
  if(item.startsWith('[Q]')){badge=tag('','law');item=item.slice(3).trim();bg='rgba(251,191,36,.06)'}
  else if(item.startsWith('[E]')){badge=tag('','eq');item=item.slice(3).trim();bg='rgba(52,211,153,.06)'}
  else if(item.startsWith('[O]')){badge=tag('','obs');item=item.slice(3).trim();bg='rgba(244,114,184,.06)'}
  else if(item.startsWith('[M]')){badge=tag('','mem');item=item.slice(3).trim();bg='rgba(167,139,250,.06)'}
  const bullet = badge ? '📌' : '•';
  return `<div class="node-item" style="background:${bg}">\
<span class="node-item-bullet">${bullet}</span>\
<span>${badge}${item}</span></div>`;
}

function render(){
  const c = document.getElementById('content');
  const back = document.getElementById('btn-back');
  const title = document.getElementById('topbar-title');

  // Update bottom nav
  ['home','search','compare','quiz','flash'].forEach(t=>{
    document.getElementById('nav-'+t).classList.toggle('active', state.tab===t);
  });

  if(state.tab==='home'){
    back.style.display = state.path.length>0?'':'none';
    if(state.path.length===0){
      title.textContent='🧪 كيمياء الثانوية';
      c.innerHTML = renderHome();
    } else if(state.path.length===1){
      const unit = DATA.units.find(u=>u.id===state.path[0].id);
      title.textContent = unit.title;
      c.innerHTML = renderUnit(unit);
    } else if(state.path.length===2){
      const unit = DATA.units.find(u=>u.id===state.path[0].id);
      const sec = unit.sections.find(s=>s.id===state.path[1].id);
      title.textContent = sec.title;
      c.innerHTML = renderSection(unit,sec);
    }
  } else if(state.tab==='search'){
    back.style.display='none';
    title.textContent='🔍 بحث';
    c.innerHTML = renderSearch();
  } else if(state.tab==='compare'){
    back.style.display='none';
    title.textContent='⚖️ جداول المقارنة';
    c.innerHTML = renderCompare();
  } else if(state.tab==='quiz'){
    back.style.display='none';
    title.textContent='🧠 اختبار سريع';
    c.innerHTML = renderQuiz();
  } else if(state.tab==='flash'){
    back.style.display='none';
    title.textContent='🃏 بطاقات التذكر';
    c.innerHTML = renderFlash();
  }

  c.classList.remove('fade-in');
  void c.offsetWidth;
  c.classList.add('fade-in');
}

function renderHome(){
  return DATA.units.map(u=>{
    const total = u.sections.reduce((a,s)=>a+s.nodes.length,0);
    const seen = state.progress[u.id] ? state.progress[u.id].size : 0;
    const pct = total>0?Math.round(seen/total*100):0;
    return `<div class="unit-card" onclick="openUnit('${u.id}')" style="border-color:${u.color}33">
      <div class="unit-icon">${u.icon}</div>
      <div class="unit-info">
        <div class="unit-title" style="color:${u.color}">${u.title}</div>
        <div class="unit-meta">${u.sections.length} أقسام • ${total} موضوع • ${pct}% تمت</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${u.color}"></div></div>
      </div>
      <div class="unit-arrow">←</div>
    </div>`;
  }).join('');
}

function renderUnit(unit){
  return unit.sections.map(s=>`
    <div class="section-btn" onclick="openSection('${unit.id}','${s.id}')" style="border-color:${unit.color}33">
      <div>
        <div class="section-title-text" style="color:${unit.color}">📘 ${s.title}</div>
        <div class="section-meta">${s.nodes.length} موضوع</div>
      </div>
      <div style="color:var(--muted)">←</div>
    </div>`).join('');
}

function renderSection(unit,sec){
  // Mark progress
  if(!state.progress[unit.id]) state.progress[unit.id]=new Set();

  return sec.nodes.map((node,i)=>{
    const nodeId = sec.id+'_'+i;

    if(node.isTable && node.tableData){
      const td = node.tableData;
      return `<div class="compare-section fade-in">
        <h4 style="color:${node.color}">${node.title}</h4>
        <div style="overflow-x:auto">
        <table class="compare-table">
          <tr>${td.headers.map(h=>`<th style="color:${node.color}">${h}</th>`).join('')}</tr>
          ${td.rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}
        </table></div></div>`;
    }

    if(node.isExpected){
      return `<div class="compare-section fade-in" style="border:1px solid #fbbf2444">
        <h4 style="color:#fbbf24">❓ ${node.title}</h4>
        ${node.items.map((q,qi)=>`<div class="expected-q"><span class="q-num">س${qi+1}</span>${q}</div>`).join('')}
      </div>`;
    }

    return `<div class="node-card fade-in" id="node_${nodeId}">
      <div class="node-header" id="nh_${nodeId}" style="background:rgba(0,0,0,.2);border-color:${node.color}44"
        onclick="toggleNode('${nodeId}','${unit.id}')">
        <span class="node-arrow" id="na_${nodeId}">▼</span>
        <span class="node-title-text" style="color:${node.color}">${node.title}</span>
      </div>
      <div class="node-body" id="nb_${nodeId}" style="background:${node.color}0d;border-color:${node.color}33">
        ${node.items.map(item=>renderItem(item)).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleNode(id, unitId){
  const h=document.getElementById('nh_'+id);
  const b=document.getElementById('nb_'+id);
  if(!h||!b) return;
  const isOpen = b.classList.contains('open');
  h.classList.toggle('open',!isOpen);
  b.classList.toggle('open',!isOpen);
  if(!isOpen && unitId){
    if(!state.progress[unitId]) state.progress[unitId]=new Set();
    state.progress[unitId].add(id);
    saveProgress();
  }
}

function renderSearch(){
  return `<div id="search-wrap">
    <input id="search-input" type="search" placeholder="ابحث: معادلة، عنصر، تفاعل..." 
      oninput="doSearch(this.value)" autocomplete="off"/>
    <span id="search-icon">🔍</span>
  </div>
  <div id="search-results"></div>
  <div class="empty" id="search-empty">
    <div class="e-icon">🔍</div>
    <div>اكتب للبحث في كل المحتوى</div>
  </div>`;
}

function doSearch(q){
  const res = document.getElementById('search-results');
  const emp = document.getElementById('search-empty');
  if(!q||q.length<2){res.classList.remove('show');emp.style.display='block';return;}
  emp.style.display='none';
  const ql = q.toLowerCase();
  const hits=[];
  DATA.units.forEach(u=>{
    u.sections.forEach(s=>{
      s.nodes.forEach(n=>{
        if(n.title.includes(q)||n.title.toLowerCase().includes(ql)){
          hits.push({unit:u,sec:s,node:n,match:n.title,items:[]});
        }
        const matchItems = (n.items||[]).filter(it=>it.includes(q)||it.toLowerCase().includes(ql));
        if(matchItems.length){
          hits.push({unit:u,sec:s,node:n,match:n.title,items:matchItems.slice(0,2)});
        }
      });
    });
  });
  const unique=[];const seen=new Set();
  hits.forEach(h=>{const k=h.unit.id+h.sec.id+h.node.title;if(!seen.has(k)){seen.add(k);unique.push(h);}});
  if(!unique.length){res.innerHTML='<div class="empty"><div class="e-icon">😕</div><div>لا نتائج</div></div>';res.classList.add('show');return;}
  res.innerHTML=unique.slice(0,20).map(h=>`
    <div class="search-item" onclick="jumpToNode('${h.unit.id}','${h.sec.id}')">
      <div class="search-item-title" style="color:${h.unit.color}">${h.node.title}</div>
      <div class="search-item-path">${h.unit.title} ← ${h.sec.title}</div>
      ${h.items.map(it=>`<div class="search-item-preview">${it.replace(q,'<mark>'+q+'</mark>')}</div>`).join('')}
    </div>`).join('');
  res.classList.add('show');
}

function answerQuiz(i){
  if(state.quizAnswered) return;
  state.quizAnswered=true;
  const q=QUIZ_QUESTIONS[state.quizIdx];
  const opts=document.querySelectorAll('.quiz-opt');
  opts.forEach((o,idx)=>{
    if(idx===q.ans) o.classList.add('correct');
    else if(idx===i&&i!==q.ans) o.classList.add('wrong');
    else o.classList.add('reveal');
    o.disabled=true;
  });
  if(i===q.ans) state.quizScore++;
  render(); // re-render to show Next button
}

function nextQuestion(){
  state.quizIdx++;
  state.quizAnswered=false;
  if(state.quizIdx>=QUIZ_QUESTIONS.length) state.quizDone=true;
  render();
}

function restartQuiz(){
  state.quizIdx=0;state.quizScore=0;state.quizAnswered=false;state.quizDone=false;
  render();
}

function renderFlash(){
  const fc=FLASHCARDS[state.fcIdx];
  return `<div style="margin-bottom:12px;text-align:center;color:var(--muted);font-size:13px">
    ${state.fcIdx+1} / ${FLASHCARDS.length}
  </div>
  <div class="flashcard-wrap" onclick="flipCard()">
    <div class="flashcard ${state.fcFlipped?'flipped':''}">
      <div class="flashcard-front">
        <div class="fc-label">السؤال — انقر للإجابة</div>
        <div class="fc-text">${fc.front}</div>
      </div>
      <div class="flashcard-back">
        <div class="fc-label">الإجابة ✓</div>
        <div class="fc-text" style="white-space:pre-line">${fc.back}</div>
      </div>
    </div>
  </div>
  <div class="fc-nav">
    <button class="fc-nav-btn" onclick="prevCard()">← السابق</button>
    <span class="fc-counter">${state.fcFlipped?'✓ اطلعت':'انقر للقلب'}</span>
    <button class="fc-nav-btn" onclick="nextCard()">التالي →</button>
  </div>`;
}

function flipCard(){state.fcFlipped=!state.fcFlipped;render();}
function nextCard(){state.fcIdx=(state.fcIdx+1)%FLASHCARDS.length;state.fcFlipped=false;render();}
function prevCard(){state.fcIdx=(state.fcIdx-1+FLASHCARDS.length)%FLASHCARDS.length;state.fcFlipped=false;render();}

function openUnit(id){state.path=[{id}];render();}
function openSection(uid,sid){state.path=[{id:uid},{id:sid}];render();}
function goBack(){
  if(state.path.length>0){state.path.pop();render();}
}
function switchTab(t){
  state.tab=t;
  if(t==='home') state.path=[];
  render();
}
function toggleTheme(){
  const body=document.body;
  const isDark=body.getAttribute('data-theme')==='dark';
  body.setAttribute('data-theme',isDark?'light':'dark');
  document.getElementById('btn-theme').textContent=isDark?'🌙':'☀️';
}

// INITIAL
render();

// Handle back gesture
window.addEventListener('popstate',()=>{if(state.path.length>0){goBack();}});
</script>
</body>
</html>
